<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#87CEEB"></rect>

  <!-- Sun -->
  <circle cx="60" cy="60" r="28" fill="#FFD93D"></circle>
  
  <!-- Sun rays -->
  <g stroke="#FFD93D" stroke-width="4" stroke-linecap="round">
    <line x1="60" y1="18" x2="60" y2="2"></line>
    <line x1="60" y1="118" x2="60" y2="102"></line>
    <line x1="18" y1="60" x2="2" y2="60"></line>
    <line x1="118" y1="60" x2="102" y2="60"></line>
    <line x1="30" y1="30" x2="18" y2="18"></line>
    <line x1="90" y1="90" x2="102" y2="102"></line>
    <line x1="90" y1="30" x2="102" y2="18"></line>
    <line x1="30" y1="90" x2="18" y2="102"></line>
  </g>

  <!-- Cloud -->
  <g fill="#FFFFFF">
    <circle cx="115" cy="95" r="25"></circle>
    <circle cx="140" cy="85" r="30"></circle>
    <circle cx="165" cy="98" r="22"></circle>
    <rect x="95" y="95" width="90" height="30"></rect>
  </g>

  <!-- Rain -->
  <g stroke="#4A90E2" stroke-width="4" stroke-linecap="round">
    <line x1="115" y1="135" x2="108" y2="150"></line>
    <line x1="140" y1="135" x2="133" y2="150"></line>
    <line x1="165" y1="135" x2="158" y2="150"></line>
  </g>
</svg>