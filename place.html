<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jean Rodne Cademus">  

    <title>Place Page</title>

    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>

</head>

<body>

    <header>

        <h1>Brazil</h1>

    </header>

    <main>

        <picture>

            <source srcset="images/brazil-large-flag.webp" media="(min-width: 768px)">

            <img src="images/brazil-small.webp" alt="Brazil landscape">

        </picture>

        <section class="data">

            <h2>Data</h2>

            <p><strong>Area:</strong> 8,515,767 sq km</p>

            <p><strong>Population:</strong> 214 million</p>

            <p><strong>Capital:</strong> Brasília</p>

            <p><strong>Language:</strong> Portuguese</p>

            <p><strong>Currency:</strong> Brazilian Real</p>

            <p><strong>Time Zone:</strong> UTC -3</p>

        </section>

        <section class="weather">

            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temp">45</span> °F</p>

            <p><strong>Wind Speed:</strong> <span id="speed">10</span> mph</p>

            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>

        </section>

    </main>

   <footer>
    <p>
        © <span id="currentyear"></span> 🌺 Jean Rodne Cademus 🌺 Haiti
    </p>

    <p id="lastModified"></p>
</footer>
</body>

</html>
