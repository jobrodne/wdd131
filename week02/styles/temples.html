<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js"></script>
    <script defer>
        // Add the current year to the copyright span
        document.addEventListener('DOMContentLoaded', () => {
            const currentYear = new Date().getFullYear();
            document.getElementById('currentYear').textContent = currentYear;

            // Display the last modified date
            const lastModified = document.lastModified;
            document.getElementById('lastModified').textContent = lastModified;
        });
    </script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
    </header>

    <main>
        <h2>Home</h2>
        <section>
            <figure>
                <img src="images/temple1.jpg" alt="temple 1">
                <figcaption>San Diego California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple2.jpg" alt="temple 2">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple3.jpg" alt="temple 3">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple4.jpg" alt="temple 4">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple5.jpg" alt="temple 5">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple6.jpg" alt="temple 6">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple3.jpg" alt="temple 7">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple4.jpg" alt="temple 8">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple5.jpg" alt="temple 9">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple6.jpg" alt="temple 10">
                <figcaption>San Francisco California Temple</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="currentYear"></span> Jean Rodne Cademus, Haiti</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
