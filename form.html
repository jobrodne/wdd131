<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="js/form.js" defer></script>
</head>
<body>

<div class="container">

    <h1>Product Review</h1>

    <form action="review.html" method="get">

        <!-- Product Name -->
        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <!-- Overall Rating -->
        <fieldset>
            <legend>Overall Rating</legend>

            <div class="rating-group">

                <label>
                    ☆
                    <input type="radio" id="rating1" name="rating" value="1" required>
                </label>

                <label>
                    ☆☆
                    <input type="radio" id="rating2" name="rating" value="2">
                </label>

                <label>
                    ☆☆☆
                    <input type="radio" id="rating3" name="rating" value="3">
                </label>

                <label>
                    ☆☆☆☆
                    <input type="radio" id="rating4" name="rating" value="4">
                </label>

                <label>
                    ☆☆☆☆☆
                    <input type="radio" id="rating5" name="rating" value="5">
                </label>

            </div>
        </fieldset>

        <!-- Installation Date -->
        <label for="installDate">Date of Installation</label>
        <input
            type="date"
            id="installDate"
            name="installDate"
            required>

        <!-- Features -->
        <fieldset>
            <legend>Useful Features</legend>

            <label>
                <input
                    type="checkbox"
                    id="durability"
                    name="features"
                    value="Durability">
                Durability
            </label>

            <label>
                <input
                    type="checkbox"
                    id="ease"
                    name="features"
                    value="Ease of Use">
                Ease of Use
            </label>

            <label>
                <input
                    type="checkbox"
                    id="performance"
                    name="features"
                    value="Performance">
                Performance
            </label>

            <label>
                <input
                    type="checkbox"
                    id="design"
                    name="features"
                    value="Design">
                Design
            </label>

        </fieldset>

        <!-- Review -->
        <label for="review">Written Review (Optional)</label>
        <textarea
            id="review"
            name="review"
            rows="5"></textarea>

        <!-- Name -->
        <label for="userName">Your Name (Optional)</label>
        <input
            type="text"
            id="userName"
            name="userName">

        <!-- Submit -->
        <input
            type="submit"
            value="Post Review"
            class="submit-btn">

    </form>

</div>

 <footer>
    <p>
        © <span id="currentyear"></span> 🌺 Jean Rodne Cademus 🌺 Haiti
    </p>

    <p id="lastModified"></p>
</footer>

</body>
</html>
