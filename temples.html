<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Come check out our temples">
    <meta name="author" content="Jean Rodne Cademus">
    <title>Temple Album</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js"></script>
    <script defer>
        // Add the current year to the copyright span
        document.addEventListener('DOMContentLoaded', () => {
            const currentYear = new Date().getFullYear();
            document.getElementById('currentYear').textContent = currentYear;

            // Display the last modified date
            const lastModified = document.lastModified;
            document.getElementById('lastModified').textContent = lastModified;
        });
    </script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Home</h2>
        <section>
            <figure>
                <img src="images/san-diego-temple.jpg" alt="San Diego California Temple">
                <figcaption>San Diego California Temple</figcaption>
            </figure>
            <figure>
                <img src="images/haiti-temple.jpg" alt="Haiti Temple">
                <figcaption>Haiti Temple</figcaption>
            </figure>
            <figure>
                <img src="images/rome-temple.jpg" alt="Rome Temple 3">
                <figcaption>Rome Temple</figcaption>
            </figure>
            <figure>
                <img src="images/layton-temple.jpg" alt="Layton Temple">
                <figcaption>Layton Temple</figcaption>
            </figure>
            <figure>
                <img src="images/paris-temple.jpg" alt="Paris Temple">
                <figcaption>Paris Temple</figcaption>
            </figure>
            <figure>
                <img src="images/sao-paulo-temple.jpg" alt="Sao Paulo Temple">
                <figcaption>Sao Paulo Temple</figcaption>
            </figure>
            <figure>
                <img src="images/st-george-temple.jpg" alt="St-George Temple">
                <figcaption>St-George Temple</figcaption>
            </figure>
            <figure>
                <img src="images/dominican-republic-temple.jpg" alt="Dominican Republic Temple">
                <figcaption>Dominican Republic Temple</figcaption>
            </figure>
            <figure>
                <img src="images/bismark-temple.jpg" alt="Bismark Temple">
                <figcaption>Bismark Temple</figcaption>
            </figure>
            <figure>
                <img src="images/ogden-temple.jpg" alt="Ogden Temple">
                <figcaption>Ogden Temple</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="currentYear"></span> Jean Rodne Cademus, Haiti</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
